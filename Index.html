<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hydroponic Sensor Dashboard</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #051937, #004d7a, #008793, #00bf72);
      min-height: 100vh;
      color: white;
      padding: 30px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .title-box {
      text-align: center;
      padding: 30px;
      margin-bottom: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
    }

    .title-box h1 {
      font-size: 2.5rem;
      text-shadow: 0 0 10px #00ffcc;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 35px;
    }

    .card {
      background: rgba(255,255,255,0.14);
      border-radius: 20px;
      padding: 25px;
      text-align: center;
    }

    .reading {
      font-size: 2.2rem;
      margin: 10px 0;
    }

    .status {
      background: rgba(0,0,0,0.3);
      padding: 6px 12px;
      border-radius: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: center;
    }

    th {
      background: rgba(0,0,0,0.3);
    }

    td {
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

<div class="container">

  <div class="title-box">
    <h1>Hydroponic Sensor Dashboard</h1>
    <p>Live Data from Backend Database</p>
  </div>

  <div class="cards">

    <div class="card">
      <h2>Temperature</h2>
      <div class="reading" id="temp">Waiting...</div>
      <div class="status" id="tempStatus">No Data</div>
    </div>

    <div class="card">
      <h2>pH Level</h2>
      <div class="reading" id="ph">Waiting...</div>
      <div class="status" id="phStatus">No Data</div>
    </div>

    <div class="card">
      <h2>Water Level</h2>
      <div class="reading" id="level">Waiting...</div>
      <div class="status" id="levelStatus">No Data</div>
    </div>

    <div class="card">
      <h2>System</h2>
      <div class="reading" id="system">OFFLINE</div>
      <div class="status" id="systemStatus">Waiting for Backend</div>
    </div>

  </div>

  <h2 style="text-align:center; margin-bottom:15px;">Recent Readings</h2>

  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>Temp</th>
        <th>pH</th>
        <th>Water</th>
      </tr>
    </thead>
    <tbody id="historyTable">
      <tr>
        <td colspan="4">No data yet</td>
      </tr>
    </tbody>
  </table>

</div>

<script>
  const API_URL = "http://127.0.0.1:8000/telemetry/?limit=5";

  async function loadSensorData() {
    try {
      const response = await fetch(API_URL);

      if (!response.ok) {
        throw new Error("Backend error");
      }

      const data = await response.json();

      if (!data.length) {
        throw new Error("No data in DB yet");
      }

      const latest = data[0];

      document.getElementById("temp").textContent =
        latest.temperature_water.toFixed(1) + "°F";

      document.getElementById("ph").textContent =
        latest.ph.toFixed(1);

      document.getElementById("level").textContent =
        latest.water_level.toFixed(0) + "%";

      document.getElementById("system").textContent = "ONLINE";
      document.getElementById("systemStatus").textContent = "Connected";

      document.getElementById("tempStatus").textContent = "Live";
      document.getElementById("phStatus").textContent = "Live";
      document.getElementById("levelStatus").textContent = "Live";

      updateTable(data);

    } catch (err) {
      document.getElementById("system").textContent = "OFFLINE";
      document.getElementById("systemStatus").textContent = "Waiting for Data";
    }
  }

  function updateTable(data) {
    const table = document.getElementById("historyTable");
    table.innerHTML = "";

    data.forEach(item => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${item.timestamp}</td>
        <td>${item.temperature_water.toFixed(1)}°F</td>
        <td>${item.ph.toFixed(1)}</td>
        <td>${item.water_level.toFixed(0)}%</td>
      `;

      table.appendChild(row);
    });
  }

  loadSensorData();
  setInterval(loadSensorData, 3000);
</script>

</body>
</html>
